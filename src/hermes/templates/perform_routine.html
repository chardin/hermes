<html>
  <head>
    <title>Perform Routine</title>
    {% include 'header.inc' %}
  </head>
  <body>
    {% include 'flashed.inc' %}
    
    <H1>Perform routine: {{ routine.name }}</H1>
    <BR>
    <audio controls>
      <source src="{{ url_for('play_routine', routine_id=routine.routine_id) }}" type="audio/mpeg">
    </audio>
    <BR>
    <P class="record-routine">
    Alternatively:
    <a href="{{ url_for('play_routine', routine_id=routine.routine_id, as_attachment=True) }}">
      <button type="button">Download File</button>
    </a>
    </P>
    <BR>
    <form method="POST" class="record-routine">
      {{ form.hidden_tag() }}
      {{ form.submit() }}
      <BR>
      {{ form.notes.label }} {{ form.notes() }}
      {{ pagedown.include_pagedown() }}
    </form>
    <BR>
    <a href='/dashboard'>Return to dashboard</a>
  </body>
</html>
