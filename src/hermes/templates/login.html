<html>
  <head>
    <title>Hermes Login</title>
    {% include 'header.inc' %}
  </head>
  <body>
    {% include 'flashed.inc' %}
    <H1>Welcome to Hermes</H1>

    <form method="POST">
      {{ form.hidden_tag() }}
      {{ form.username.label }} {{ form.username() }}
      <br>
      {{ form.password.label }} {{ form.password() }}
      <br>
      {{ form.remember_me() }} {{ form.remember_me.label }}
      <br>
      {{ form.submit() }}
    </form>
  </body>
</html>
